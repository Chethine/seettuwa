
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --v:#7C3AED;--vl:#EDE9FE;--vd:#4C1D95;
  --r:#E11D48;--rl:#FFE4E6;
  --g:#059669;--gl:#D1FAE5;
  --o:#EA580C;--ol:#FED7AA;
  --b:#0284C7;--bl:#E0F2FE;
  --am:#D97706;--aml:#FEF3C7;
  --gold:#F59E0B;
  --bg:#FFFBF5;--card:#FFFFFF;
  --txt:#1C1917;--muted:#78716C;--border:#E7E5E4;
  --rad:14px;--rad-sm:9px;
}

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt)}

/* ── DEVICE BADGE ── */
.device-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;margin-bottom:10px;
}
.device-badge.mobile{background:#D1FAE5;color:#065F46}
.device-badge.desktop{background:#E0F2FE;color:#0C4A6E}

/* ── HERO ── */
.hero{
  padding:0;text-align:center;position:relative;overflow:hidden;
}
.hero-inner{
  background:linear-gradient(135deg,#4C1D95 0%,#BE185D 50%,#B45309 100%);
  padding:2.2rem 1.5rem 4rem;position:relative;
}
.hero-pattern{
  position:absolute;inset:0;opacity:.07;
  background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);
  background-size:16px 16px;
}
.hero-flag{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:8px}
.hero h1{font-family:'Playfair Display',serif;font-size:46px;font-weight:900;color:#fff;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.3);margin-bottom:2px}
.hero-sub{font-size:13px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:1px}
.hero-dots{display:flex;justify-content:center;gap:7px;margin-top:14px}
.hero-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4)}
.hero-dots span:nth-child(3){background:#FDE68A;width:11px;height:11px}
.wave-svg{display:block;margin-top:-1px}

/* ── LAYOUT SHELLS ── */
.app-shell{padding:0 .9rem 2rem;max-width:1100px;margin:0 auto}

/* desktop = sidebar layout */
.desktop-layout{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start;padding-top:8px}
.mobile-layout{display:block;padding-top:8px}

/* ── STEP PILLS ── */
.steps-bar{display:flex;gap:8px;margin-bottom:16px}
.step-pill{
  flex:1;display:flex;align-items:center;gap:7px;
  background:var(--card);border-radius:30px;padding:9px 13px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  font-size:12px;font-weight:800;color:var(--muted);
  border:2px solid transparent;transition:all .25s;
}
.step-pill.active{border-color:var(--v);color:var(--v)}
.step-pill.done{border-color:var(--g);color:var(--g)}
.s-num{width:22px;height:22px;border-radius:50%;background:var(--vl);color:var(--v);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.step-pill.done .s-num{background:var(--gl);color:var(--g)}

/* ── CARDS ── */
.card{
  background:var(--card);border-radius:var(--rad);
  padding:1.4rem;margin-bottom:14px;
  box-shadow:0 2px 14px rgba(0,0,0,.07);
  border:1.5px solid var(--border);
  position:relative;overflow:hidden;
}
.card-accent{position:absolute;top:0;left:0;right:0;height:3px}
.card-accent.purple{background:linear-gradient(90deg,var(--v),var(--r))}
.card-accent.teal{background:linear-gradient(90deg,var(--g),var(--b))}
.card-accent.gold{background:linear-gradient(90deg,var(--gold),var(--o))}
.card h2{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:1.1rem;color:var(--txt)}

/* sidebar card for desktop */
.sidebar-card{
  background:linear-gradient(160deg,#1E1B4B,#4C1D95);
  border-radius:var(--rad);padding:1.4rem;color:#fff;
  box-shadow:0 4px 24px rgba(76,29,149,.3);
}
.sidebar-card h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#fff;margin-bottom:.8rem}
.sidebar-stat{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);
}
.sidebar-stat:last-of-type{border-bottom:none}
.stat-label{font-size:12px;color:rgba(255,255,255,.6);font-weight:600}
.stat-val{font-size:15px;font-weight:800;color:#fff}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.single{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
input[type=text],input[type=number]{
  width:100%;height:42px;padding:0 13px;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
  border:2px solid var(--border);border-radius:var(--rad-sm);
  background:#FAFAF9;color:var(--txt);outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:var(--v);box-shadow:0 0 0 3px var(--vl);background:#fff}

/* mobile number input bigger touch target */
.is-mobile input[type=text],.is-mobile input[type=number]{height:50px;font-size:16px}

/* ── MEMBER GRID ── */
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;margin-top:12px}
.is-mobile .members-grid{grid-template-columns:1fr 1fr}
.member-row{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#F8F7FF,#FFF);
  border:1.5px solid #EDE9FE;border-radius:var(--rad-sm);padding:8px 11px;
}
.member-row.org-row{background:linear-gradient(135deg,#FFF7ED,#FFF);border-color:var(--ol)}
.num-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:var(--vl);color:var(--v)}
.num-dot.org{background:var(--ol);color:var(--o)}
.member-row input{flex:1;border:none;background:transparent;padding:0;height:24px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;color:var(--txt);outline:none}
.is-mobile .member-row input{font-size:15px;height:28px}
.org-tag{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;background:linear-gradient(90deg,#F59E0B,#E11D48);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}

/* ── BUTTONS ── */
.btn-gen{padding:10px 20px;border-radius:30px;background:linear-gradient(90deg,var(--v),var(--b));color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(124,58,237,.3);transition:transform .15s,box-shadow .15s}
.btn-gen:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(124,58,237,.4)}
.btn-start{width:100%;padding:14px;border-radius:30px;background:linear-gradient(90deg,var(--r),var(--o));color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:14px;box-shadow:0 3px 14px rgba(225,29,72,.3);transition:transform .15s;letter-spacing:.3px}
.btn-start:hover{transform:translateY(-2px)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}
.is-mobile .btn-start{padding:16px;font-size:17px}
.btn-draw{padding:13px 26px;border-radius:30px;background:linear-gradient(90deg,var(--g),#10B981);color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(5,150,105,.3);transition:transform .15s}
.btn-draw:hover{transform:translateY(-2px)}
.btn-draw:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-draw-all{padding:13px 26px;border-radius:30px;background:linear-gradient(90deg,var(--gold),var(--o));color:#fff;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(217,119,6,.3);transition:transform .15s}
.btn-draw-all:hover{transform:translateY(-2px)}
.btn-draw-all:disabled{opacity:.4;cursor:not-allowed}
.is-mobile .btn-draw,.is-mobile .btn-draw-all{padding:16px 28px;font-size:16px;flex:1}
.btn-reset{padding:9px 18px;border-radius:30px;background:transparent;color:var(--muted);border:2px solid var(--border);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-reset:hover{background:var(--border);color:var(--txt)}

/* ── DRAW ARENA ── */
.draw-arena{
  background:linear-gradient(135deg,#FFF7ED,#EDE9FE);
  border-radius:var(--rad);padding:1.8rem 1.4rem;text-align:center;
  border:2px dashed rgba(124,58,237,.2);margin-bottom:14px;
}
.round-pill{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(90deg,var(--v),var(--r));color:#fff;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:800;margin-bottom:1.2rem;box-shadow:0 2px 10px rgba(124,58,237,.25)}
.bowl-wrap{width:170px;height:106px;margin:0 auto .9rem;position:relative}
.bowl-svg-el{width:170px;height:106px}
.chits-cont{position:absolute;top:5px;left:8px;right:8px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center;padding:0 8px}
.chit{width:32px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.ch0{background:linear-gradient(135deg,var(--v),#A78BFA)}
.ch1{background:linear-gradient(135deg,var(--r),#FB7185)}
.ch2{background:linear-gradient(135deg,var(--g),#34D399)}
.ch3{background:linear-gradient(135deg,var(--gold),var(--o))}
.chit.shake{animation:shk .28s infinite}
@keyframes shk{0%,100%{transform:rotate(-4deg) scale(1.1)}50%{transform:rotate(4deg) scale(1.15)}}
.name-wrap{min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;margin:.8rem 0}
.drawn-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;background:linear-gradient(90deg,var(--v),var(--r),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;min-height:35px}
.is-mobile .drawn-name{font-size:24px}
.drawn-name.pop{animation:pop .45s cubic-bezier(.17,.67,.35,1.3)}
@keyframes pop{0%{opacity:0;transform:scale(.6) translateY(10px)}60%{transform:scale(1.08) translateY(-3px)}100%{opacity:1;transform:scale(1)}}
.drawn-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.prog-wrap{background:rgba(0,0,0,.08);border-radius:8px;height:7px;margin:.8rem 0;overflow:hidden}
.prog-bar{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--v),var(--r),var(--gold));transition:width .45s ease}
.hint{font-size:11px;color:var(--muted);margin-top:7px;font-style:italic}
.act-row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:.9rem}

/* ── RESULTS ── */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.results-header h2{font-family:'Playfair Display',serif;font-size:19px;font-weight:700}
.result-row{
  display:flex;align-items:center;gap:11px;
  padding:10px 13px;border-radius:var(--rad-sm);
  margin-bottom:7px;
  animation:slidein .3s ease forwards;opacity:0;
}
@keyframes slidein{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.result-row.org-res{background:linear-gradient(135deg,#FFF7ED,#FFFBEB);border:1.5px solid var(--aml)}
.result-row:not(.org-res){background:linear-gradient(135deg,#F8F7FF,#fff);border:1.5px solid var(--vl)}
.r-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.r-name{font-size:14px;font-weight:800;flex:1;color:var(--txt)}
.is-mobile .r-name{font-size:15px}
.r-badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:3px 9px;border-radius:11px;white-space:nowrap}
.rb-org{background:linear-gradient(90deg,#FDE68A,#FCA5A5);color:#92400E}
.rb-done{background:var(--gl);color:#065F46}

/* ── SHARE ── */
.share-panel{background:linear-gradient(135deg,#1E1B4B,#4C1D95);border-radius:var(--rad);padding:1.4rem;margin-bottom:14px;color:#fff}
.share-panel h3{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:4px}
.share-panel p{font-size:12px;color:rgba(255,255,255,.65);margin-bottom:1rem}
.share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.is-mobile .share-grid{grid-template-columns:repeat(2,1fr)}
.sh-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:13px 8px;border-radius:var(--rad-sm);border:1.5px solid rgba(255,255,255,.15);cursor:pointer;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:#fff;background:rgba(255,255,255,.07);transition:background .18s,transform .14s}
.sh-btn:hover{background:rgba(255,255,255,.18);transform:translateY(-2px)}
.sh-btn:active{transform:scale(.95)}
.is-mobile .sh-btn{padding:16px 8px;font-size:13px}
.sh-icon{font-size:22px;line-height:1}
.is-mobile .sh-icon{font-size:28px}
.sh-btn.wa{border-color:rgba(37,211,102,.4);background:rgba(37,211,102,.1)}
.sh-btn.wa:hover{background:rgba(37,211,102,.22)}
.sh-btn.img{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.1)}
.sh-btn.img:hover{background:rgba(245,166,35,.22)}
.sh-btn.pdf{border-color:rgba(225,29,72,.4);background:rgba(225,29,72,.1)}
.sh-btn.pdf:hover{background:rgba(225,29,72,.22)}
.sh-btn.copy{border-color:rgba(14,165,233,.4);background:rgba(14,165,233,.1)}
.sh-btn.copy:hover{background:rgba(14,165,233,.22)}
.sh-status{font-size:11px;color:rgba(255,255,255,.55);margin-top:9px;min-height:16px}

/* ── FOOTER ── */
.footer{border-top:2px dashed rgba(0,0,0,.08);padding-top:1.2rem;margin-top:.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:11px}
.cr-row{display:flex;align-items:center;gap:9px}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--r));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.cr-name{font-size:13px;font-weight:800;color:var(--txt)}
.cr-role{font-size:10px;color:var(--muted);font-style:italic}
.link-btns{display:flex;gap:7px}
.lbtn{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;text-decoration:none;cursor:pointer;transition:all .18s;border:2px solid transparent}
.lbtn.li{border-color:#0A66C2;color:#0A66C2;background:rgba(10,102,194,.06)}
.lbtn.li:hover{background:rgba(10,102,194,.14)}
.lbtn.po{border-color:var(--v);color:var(--v);background:var(--vl)}
.lbtn.po:hover{background:#C4B5FD}
.lbtn svg{width:13px;height:13px;flex-shrink:0}

/* ── CONFETTI ── */
.cfp{position:fixed;top:-20px;animation:cfall linear forwards;pointer-events:none;z-index:9999;border-radius:2px}
@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── SNAPSHOT (off-screen for capture) ── */
#snap{position:fixed;left:-9999px;top:0;width:460px;padding:28px;background:linear-gradient(135deg,#1E1B4B,#7C3AED);font-family:'Nunito',sans-serif;color:#fff;border-radius:20px}

/* ── PROGRESS RING (desktop sidebar) ── */
.prog-ring-wrap{display:flex;flex-direction:column;align-items:center;margin:1rem 0}
.prog-ring-label{font-size:12px;color:rgba(255,255,255,.6);margin-top:6px;font-weight:700}
</style>

<div id="app">
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-pattern"></div>
      <div class="hero-flag">🇱🇰 Traditional Sri Lankan</div>
      <h1>සීට්ටු</h1>
      <p class="hero-sub">Seettuwa · Rotating Savings Draw</p>
      <div class="hero-dots"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <svg class="wave-svg" viewBox="0 0 1440 44" xmlns="http://www.w3.org/2000/svg"><path d="M0,22 C360,44 1080,0 1440,22 L1440,44 L0,44 Z" fill="#FFFBF5"/></svg>
  </div>

  <div class="app-shell" id="app-shell">
    <div id="device-info" style="text-align:center;margin-bottom:10px"></div>

    <!-- STEPS BAR -->
    <div class="steps-bar" id="steps-bar">
      <div class="step-pill active" id="step1"><div class="s-num">1</div><span>Setup</span></div>
      <div class="step-pill" id="step2"><div class="s-num">2</div><span>Members</span></div>
      <div class="step-pill" id="step3"><div class="s-num">3</div><span>Draw</span></div>
    </div>

    <!-- CONTENT AREA (layout injected by JS) -->
    <div id="content-area"></div>
  </div>
</div>

<div id="snap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
/* ── DEVICE DETECTION ── */
const isMobile=(()=>{
  const ua=navigator.userAgent||'';
  const mobileUA=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  const touch=navigator.maxTouchPoints>1;
  const narrow=window.innerWidth<768;
  return mobileUA||narrow||(touch&&narrow);
})();

if(isMobile) document.body.classList.add('is-mobile');

/* show device badge */
const devBadge=document.getElementById('device-info');
devBadge.innerHTML=`<span class="device-badge ${isMobile?'mobile':'desktop'}">${isMobile?'📱 Mobile layout':'💻 Desktop layout'}</span>`;

/* ── STATE ── */
let members=[],remaining=[],drawn=[],total=0,drawing=false;
const COLORS=['ch0','ch1','ch2','ch3'];
const ROW_GRADS=[
  'linear-gradient(135deg,#7C3AED,#A78BFA)',
  'linear-gradient(135deg,#E11D48,#FB7185)',
  'linear-gradient(135deg,#059669,#34D399)',
  'linear-gradient(135deg,#D97706,#FBBF24)',
  'linear-gradient(135deg,#0284C7,#38BDF8)',
  'linear-gradient(135deg,#7C3AED,#EC4899)',
  'linear-gradient(135deg,#EA580C,#FB923C)',
  'linear-gradient(135deg,#059669,#10B981)',
];

/* ── RENDER SETUP FORM ── */
function renderSetup(){
  const ca=document.getElementById('content-area');
  if(isMobile){
    ca.className='mobile-layout';
    ca.innerHTML=`
      <div class="card">
        <div class="card-accent purple"></div>
        <h2>Group details</h2>
        <div class="form-row"><div class="fg"><label>Number of members</label><input type="number" id="mc" min="2" max="50" value="6"/></div><div class="fg"><label>Organizer name</label><input type="text" id="on" placeholder="e.g. Nimal"/></div></div>
        <button class="btn-gen" onclick="genMembers()">Generate fields →</button>
      </div>
      <div class="card" id="mcard" style="display:none">
        <div class="card-accent purple"></div>
        <h2>Member names</h2>
        <p style="font-size:12px;color:var(--muted);margin-bottom:4px">Organizer gets <strong>Round 1</strong> automatically</p>
        <div class="members-grid" id="mgrid"></div>
        <button class="btn-start" onclick="startDraw()">🎲 Start the Draw!</button>
      </div>
      ${footerHTML()}`;
  } else {
    ca.className='desktop-layout';
    ca.innerHTML=`
      <div>
        <div class="sidebar-card">
          <h3>Seettuwa Setup</h3>
          <div class="fg" style="margin-bottom:12px"><label style="color:rgba(255,255,255,.6);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Number of members</label><input type="number" id="mc" min="2" max="50" value="6" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff"/></div>
          <div class="fg" style="margin-bottom:16px"><label style="color:rgba(255,255,255,.6);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px">Organizer name</label><input type="text" id="on" placeholder="e.g. Nimal" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff"/></div>
          <button class="btn-gen" style="width:100%" onclick="genMembers()">Generate member fields →</button>
          <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.12)">

/* ── GENERATE MEMBER INPUTS ── */
function genMembers(){
  const cnt=parseInt(document.getElementById('mc').value);
  const org=document.getElementById('on').value.trim();
  if(!cnt||cnt<2||cnt>50){alert('Please enter 2–50 members.');return;}
  total=cnt;
  updateSidebarStat('stat-members',cnt);
  updateSidebarStat('stat-rem',cnt-1);
  const grid=document.getElementById('mgrid');
  grid.innerHTML='';
  for(let i=0;i<cnt;i++){
    const isO=i===0;
    const d=document.createElement('div');
    d.className='member-row'+(isO?' org-row':'');
    d.innerHTML=`<div class="num-dot${isO?' org':''}">${i+1}</div>
      <input type="text" id="m${i}" placeholder="Name ${i+1}" value="${isO&&org?org:''}" ${isO?'disabled style="opacity:.75;font-style:italic;"':''}
        onkeydown="if(event.key==='Enter'){document.getElementById('m${Math.min(i+1,cnt-1)}')?.focus()}"/>
      ${isO?'<span class="org-tag">Organizer</span>':''}`;
    grid.appendChild(d);
  }
  const mc=document.getElementById('mcard');
  const ph=document.getElementById('members-placeholder');
  if(mc) mc.style.display='block';
  if(ph) ph.style.display='none';
  setStep(2);
  setTimeout(()=>document.getElementById('m1')?.focus(),80);
}

/* ── START DRAW ── */
function startDraw(){
  const org=document.getElementById('on').value.trim()||'Organizer';
  members=[org];
  for(let i=1;i<total;i++){
    const v=document.getElementById('m'+i)?.value.trim();
    if(!v){alert(`Enter name for member ${i+1}.`);document.getElementById('m'+i)?.focus();return;}
    members.push(v);
  }
  remaining=members.slice(1).map((n,i)=>({name:n,i:i+1}));
  drawn=[{round:1,name:org,isOrg:true}];
  renderDrawPhase();
  setStep(3);
  addResultRow(1,org,true,0);
  updateSidebarStat('stat-drawn',1);
  updateSidebarStat('stat-rem',remaining.length);
}

        <div class="round-pill"><span>🎯</span><span>Round <span id="cur-r">2</span> of ${total}</span></div>
        <div class="bowl-wrap" id="bowl">
          <svg class="bowl-svg-el" viewBox="0 0 170 106" fill="none">
            <ellipse cx="85" cy="95" rx="72" ry="11" fill="rgba(124,58,237,.1)"/>
            <path d="M13 42 Q13 95 85 95 Q157 95 157 42" fill="rgba(124,58,237,.07)" stroke="rgba(124,58,237,.28)" stroke-width="1.5"/>
            <ellipse cx="85" cy="42" rx="72" ry="17" fill="rgba(255,255,255,.7)" stroke="rgba(124,58,237,.32)" stroke-width="1.5"/>
          </svg>

        </div>

        <div class="prog-wrap"><div class="prog-bar" id="pb" style="width:${Math.round(1/total*100)}%"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px" id="pl">1 of ${total} drawn</div>
        <div class="act-row">
          <button class="btn-draw" id="dbtn" onclick="drawNext()">🎲 Draw Next</button>
          <button class="btn-draw-all" id="dabtn" onclick="drawAll()">⚡ Draw All</button>
        </div>
        <p class="hint" id="hint">Click "Draw Next" to reveal each member's round</p>

      </div>

          <button class="sh-btn wa" onclick="shareWA()"><span class="sh-icon">💬</span>WhatsApp</button>

function renderChits(){
  const c=document.getElementById('chits');if(!c)return;
  c.innerHTML='';
  remaining.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className=`chit ${COLORS[i%4]}`;d.id='c'+i;d.textContent='?';
    d.style.transform=`rotate(${(Math.random()*16-8).toFixed(1)}deg)`;
    c.appendChild(d);
  });
}

function addResultRow(round,name,isOrg,delay){
  const list=document.getElementById('rl');if(!list)return;
  const g=ROW_GRADS[(round-1)%ROW_GRADS.length];
  const d=document.createElement('div');
  d.className='result-row'+(isOrg?' org-res':'');
  d.style.animationDelay=delay+'ms';
  d.innerHTML=`<div class="r-num" style="background:${g}">${round}</div><div class="r-name">${name}</div><span class="r-badge ${isOrg?'rb-org':'rb-done'}">${isOrg?'⭐ Organizer':'✓ Drawn'}</span>`;
  list.appendChild(d);
}

function updateUI(){
  const done=drawn.length,rem=remaining.length,tot=total;
  const cr=document.getElementById('cur-r');if(cr)cr.textContent=done+1;
  const pb=document.getElementById('pb');if(pb)pb.style.width=Math.round(done/tot*100)+'%';
  const pl=document.getElementById('pl');if(pl)pl.textContent=`${done} of ${tot} drawn`;
  updateSidebarStat('stat-drawn',done);
  updateSidebarStat('stat-rem',rem);
  if(rem===0){
    const db=document.getElementById('dbtn'),dab=document.getElementById('dabtn');
    if(db)db.disabled=true;if(dab)dab.disabled=true;
    const h=document.getElementById('hint');if(h)h.textContent='All rounds have been drawn! 🎉';
    const sp=document.getElementById('sp');if(sp)sp.style.display='block';
    confetti();
  }
}

function updateSidebarStat(id,val){
  const el=document.getElementById(id);if(el)el.textContent=val;
}

function drawNext(){
  if(remaining.length===0||drawing)return;
  drawing=true;
  const idx=Math.floor(Math.random()*remaining.length);
  const winner=remaining.splice(idx,1)[0];
  const round=drawn.length+1;
  drawn.push({round,name:winner.name});
  const ne=document.getElementById('dn'),le=document.getElementById('dl');
  if(ne){ne.textContent='...';ne.classList.remove('pop');}
  document.querySelectorAll('.chit').forEach(c=>c.classList.add('shake'));
  setTimeout(()=>{
    document.querySelectorAll('.chit').forEach(c=>c.classList.remove('shake'));
    document.getElementById('c'+idx)?.remove();
    document.querySelectorAll('.chit').forEach((c,i)=>c.id='c'+i);
    if(ne){ne.textContent=winner.name;void ne.offsetWidth;ne.classList.add('pop');}
    if(le)le.textContent=`receives Round ${round}`;
    addResultRow(round,winner.name,false,(drawn.length-1)*50);
    updateUI();drawing=false;
  },650);
}

async function drawAll(){
  if(remaining.length===0||drawing)return;
  const n=remaining.length;
  for(let i=0;i<n;i++) await new Promise(r=>{drawNext();setTimeout(r,950);});
}

function resetAll(){
  members=[];remaining=[];drawn=[];total=0;drawing=false;
  renderSetup();setStep(1);
}

/* ── SHARE ── */
function buildText(){
  let t='🇱🇰 *සීට්ටු — Seettuwa Draw Results* 🎲\n\n';
  drawn.forEach(d=>t+=`${d.round}. ${d.name}${d.isOrg?' ⭐ (Organizer)':''}\n`);
  t+='\n_Created by Chethine Liyanarachchi — chethine.vercel.app_';
  return t;
}

function buildSnapHTML(){
  const rows=drawn.map(d=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1)">

    <div style="font-size:14px;font-weight:700;color:#fff;flex:1">${d.name}</div>
    ${d.isOrg?'<span style="font-size:10px;background:rgba(253,230,138,.25);color:#FDE68A;padding:2px 8px;border-radius:10px;font-weight:800">Organizer</span>':''}
  </div>`).join('');
  return `<div style="font-family:Nunito,sans-serif;padding:28px;background:linear-gradient(135deg,#1E1B4B 0%,#4C1D95 50%,#7C3AED 100%);border-radius:20px">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:10px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:6px">🇱🇰 Traditional Sri Lankan</div>
      <div style="font-size:36px;font-weight:900;color:#fff;margin-bottom:2px">සීට්ටු</div>
      <div style="font-size:12px;color:rgba(255,255,255,.65);font-weight:700">Seettuwa Draw Results</div>
    </div>
    <div style="background:rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;margin-bottom:14px">${rows}</div>
    <div style="text-align:center;font-size:10px;color:rgba(255,255,255,.45);font-weight:700">Created by Chethine Liyanarachchi · chethine.vercel.app</div>
  </div>`;
}

function setStatus(m){const e=document.getElementById('ss');if(e){e.textContent=m;setTimeout(()=>e.textContent='',4000);}}
function shareWA(){window.open('https://wa.me/?text='+encodeURIComponent(buildText()),'_blank')}
async function saveImg(){
  setStatus('Generating image…');
  const s=document.getElementById('snap');s.innerHTML=buildSnapHTML();
  s.style.left='0';s.style.zIndex='-1';
  await new Promise(r=>setTimeout(r,200));
  try{
    const cv=await html2canvas(s,{scale:2,useCORS:true,backgroundColor:null,logging:false});
    s.style.left='-9999px';
    const a=document.createElement('a');a.download='seettuwa-draw.png';a.href=cv.toDataURL('image/png');a.click();
    setStatus('✅ Image saved!');
  }catch(e){s.style.left='-9999px';setStatus('❌ Error generating image');}
}
async function savePDF(){
  setStatus('Generating PDF…');
  const s=document.getElementById('snap');s.innerHTML=buildSnapHTML();
  s.style.left='0';s.style.zIndex='-1';
  await new Promise(r=>setTimeout(r,200));
  try{
    const cv=await html2canvas(s,{scale:2,useCORS:true,backgroundColor:null,logging:false});
    s.style.left='-9999px';
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const iw=180,ih=(cv.height*iw)/cv.width;
    pdf.addImage(cv.toDataURL('image/png'),'PNG',15,15,iw,ih);
    pdf.save('seettuwa-draw.pdf');setStatus('✅ PDF saved!');
  }catch(e){s.style.left='-9999px';setStatus('❌ Error generating PDF');}
}
function copyTxt(){
  const t=buildText().replace(/\*/g,'').replace(/_/g,'');
  navigator.clipboard.writeText(t).then(()=>setStatus('✅ Copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);setStatus('✅ Copied!');
  });
}

/* ── CONFETTI ── */
function confetti(){
  const cols=['#7C3AED','#E11D48','#F59E0B','#059669','#0284C7','#FDE68A','#FB7185'];
  for(let i=0;i<65;i++) setTimeout(()=>{
    const p=document.createElement('div');p.className='cfp';
    p.style.cssText=`left:${Math.random()*100}vw;width:${7+Math.random()*8}px;height:${7+Math.random()*8}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.6+Math.random()*2}s;border-radius:${Math.random()>.5?'50%':'3px'}`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),4500);
  },i*38);
}

/* ── STEPS ── */
function setStep(n){
  ['step1','step2','step3'].forEach((id,i)=>{
    document.getElementById(id).className='step-pill'+(i+1===n?' active':i+1<n?' done':'');
  });
}

/* ── INIT ── */
renderSetup();
</script>
